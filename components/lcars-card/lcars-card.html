<link rel="stylesheet" href="components/lcars-card/lcars-card.css" />
<div class="lcars-card">
  <div class="col-left">
    <div class="panel bg-one lcars-elbow top-left"></div>
    <div class="panel bg-two"><span class="num">309</span></div>
    <div class="panel bg-three"><span class="num">332</span></div>
    <div class="panel bg-four lcars-elbow bottom-left"></div>
  </div>
  <div class="col-main">
    <div class="header">
      <div class="bg-four gap-left gap-right rounded-right" id="header"><p id="header-text"></p></div>
    </div>
    <!-- CONTENT SLOT-->
    <slot class="content" name="content"></slot>

    <div class="footer">
      <div class="panel bg-four foot-1"></div>
      <div class="panel bg-two foot-2"></div>
      <div class="panel bg-three gap-right foot-3"></div>
    </div>
  </div>
  <div class="col-right">
    <div class="panel bg-one lcars-elbow top-right"></div>
    <div class="panel bg-two"></div>
    <div class="panel bg-three"></div>
    <div class="panel bg-two"></div>
    <div class="panel bg-four lcars-elbow bottom-right"></div>
  </div>
</div>
